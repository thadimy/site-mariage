[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback pour la landing
[[redirects]]
  from   = "/"
  to     = "/index.html"
  status = 200

# Passer le dossier programme/ sans transformation
[[redirects]]
  from   = "/programme/*"
  to     = "/programme/:splat"
  status = 200

# 404 personnalisée
[[redirects]]
  from   = "/*"
  to     = "/programme/404.html"
  status = 404
