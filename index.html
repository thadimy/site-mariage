  <script>
  /* Cursor image trail — blur-in / sharp / blur-out, desktop only */
  (function () {
    'use strict';
    if ('ontouchstart' in window) return;
    if (window.matchMedia('(max-width: 991px)').matches) return;

    var intro = document.querySelector('.block--intro');
    if (!intro) return;

    var IMAGES = [
      './new-young.jpeg',
      './edited-1.png',
      './new-young-2.jpeg',
      './young-3-bis.jpeg',
      './new-young-4.jpeg',
      './young-9.jpeg',
      './new-young-5.jpeg',
      './young-10.jpeg',
      './d.png',
      './young-11.jpeg',
      './a.webp',
      './young-12.jpeg',
    ];

    IMAGES.forEach(function (src) { (new Image()).src = src; });

    var idx        = 0;
    var lastX      = -9999;
    var lastY      = -9999;
    var lastTime   = 0;
    var DIST_MIN   = 80;   /* px minimum entre deux spawns */
    var TIME_MIN   = 120;  /* ms minimum entre deux spawns */

    intro.addEventListener('mousemove', function (e) {
      var now = Date.now();
      var dx  = e.clientX - lastX;
      var dy  = e.clientY - lastY;
      if (Math.sqrt(dx * dx + dy * dy) < DIST_MIN) return;
      if (now - lastTime < TIME_MIN) return;
      lastX    = e.clientX;
      lastY    = e.clientY;
      lastTime = now;
      spawn(e.clientX, e.clientY);
    });
    intro.addEventListener('mouseleave', function () {
      lastX = -9999; lastY = -9999;
    });

    function spawn(x, y) {
      var img = document.createElement('img');
      img.className = 'cursor-trail-img';
      img.src = IMAGES[idx % IMAGES.length];
      idx++;

      var rot = (Math.random() - 0.5) * 22;
      var w   = Math.round(200 + Math.random() * 80);  /* 200–280 px */
      var h   = Math.round(w * (1.2 + Math.random() * 0.2));
      var ox  = (Math.random() - 0.5) * 50;
      var oy  = (Math.random() - 0.5) * 30;

      /* État initial : flou + légèrement agrandi + invisible */
      img.style.cssText =
        'left:'      + (x - w / 2 + ox) + 'px;' +
        'top:'       + (y - h / 2 + oy) + 'px;' +
        'width:'     + w + 'px;' +
        'height:'    + h + 'px;' +
        'transform:  rotate(' + rot + 'deg) scale(1.08);' +
        'filter:     blur(14px);' +
        'opacity:    0;' +
        'transition: none;';

      document.body.appendChild(img);

      /* Double rAF pour forcer l'application du style initial */
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {

          /* ── Phase 1 : mise au point ── */
          img.style.transition =
            'transform .55s cubic-bezier(.16,1,.3,1),' +
            'filter    .4s  cubic-bezier(.16,1,.3,1),' +
            'opacity   .3s  ease';
          img.style.transform = 'rotate(' + rot + 'deg) scale(1)';
          img.style.filter    = 'blur(0px)';
          img.style.opacity   = '1';

          /* ── Phase 2 : disparition floutée ── */
          setTimeout(function () {
            img.style.transition =
              'transform .65s ease,' +
              'filter    .5s  ease,' +
              'opacity   .5s  ease';
            img.style.transform = 'rotate(' + rot + 'deg) scale(.93) translateY(-18px)';
            img.style.filter    = 'blur(10px)';
            img.style.opacity   = '0';

            setTimeout(function () {
              if (img.parentNode) img.parentNode.removeChild(img);
            }, 650);
          }, 420);
        });
      });
    }
  })();
  </script>
